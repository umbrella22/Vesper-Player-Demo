[workspace]
members = [
    "crates/model/*",
    "crates/core/*",
    "crates/ffi/*",
    "crates/plugin/*",
    "crates/plugin-decoder/*",
    "crates/plugin-remux/*",
    "crates/audio/*",
    "crates/render/*",
    "crates/backend/*",
    "crates/platform/common/*",
    "crates/platform/desktop/*",
    "crates/platform/mobile/*",
    "crates/platform/jni/*",
    "crates/tools/*",
    "examples/basic-player",
]
resolver = "3"

[workspace.package]
authors = ["umbrella22"]
edition = "2024"
license = "Apache-2.0"
rust-version = "1.94"
version = "0.3.0"

[workspace.dependencies]
anyhow = "1.0.102"
cpal = "0.17.3"
ffmpeg-next = { version = "8.1.0", default-features = false }
libloading = "0.8.9"
pollster = "0.4.0"
rtrb = "0.3.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.18"
toml = "0.9.8"
tokio = { version = "1.51.1", features = [
    "macros",
    "rt-multi-thread",
    "sync",
    "time",
] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }
wgpu = "29.0.1"
winit = "0.30.13"

[profile.release]
codegen-units = 1
lto = "thin"
strip = "debuginfo"
