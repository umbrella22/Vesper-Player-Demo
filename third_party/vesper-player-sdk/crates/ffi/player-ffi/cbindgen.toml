language = "C"
pragma_once = false
include_guard = "PLAYER_FFI_H"
autogen_warning = "/* Auto-generated by cbindgen. Do not edit this file directly. */"
include_version = false
cpp_compat = true
style = "both"
documentation = true
usize_is_size_t = true
sort_by = "Name"
no_includes = true
after_includes = """
#include <stdbool.h>
#include <stddef.h>
#include <stdint.h>

#define PLAYER_FFI_MIN_PLAYBACK_RATE 0.5f
#define PLAYER_FFI_NATURAL_PLAYBACK_RATE_MAX 2.0f
#define PLAYER_FFI_MAX_PLAYBACK_RATE 3.0f
"""

[export]
item_types = ["enums", "structs", "opaque", "functions"]

[enum]
rename_variants = "QualifiedScreamingSnakeCase"
prefix_with_name = false

[parse]
parse_deps = false
