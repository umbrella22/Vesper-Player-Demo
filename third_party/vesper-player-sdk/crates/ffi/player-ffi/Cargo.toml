[package]
name = "player-ffi"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish = false

[lib]
crate-type = ["rlib", "cdylib", "staticlib"]

[dependencies]
player-backend-ffmpeg = { path = "../../backend/player-backend-ffmpeg" }
player-runtime = { path = "../../core/player-runtime" }

[target.'cfg(target_os = "macos")'.dependencies]
player-platform-macos = { path = "../../platform/desktop/player-platform-macos" }

[target.'cfg(target_os = "windows")'.dependencies]
player-platform-windows = { path = "../../platform/desktop/player-platform-windows" }

[target.'cfg(target_os = "linux")'.dependencies]
player-platform-linux = { path = "../../platform/desktop/player-platform-linux" }

[dev-dependencies]
player-model = { path = "../../model/player-model" }
