[package]
name = "player-host-desktop"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
version.workspace = true
publish = false

[dependencies]
anyhow.workspace = true
player-model = { path = "../../../model/player-model" }
player-platform-desktop = { path = "../../common/player-platform-desktop" }
player-runtime = { path = "../../../core/player-runtime" }
player-render-wgpu = { path = "../../../render/player-render-wgpu" }
winit.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
player-platform-macos = { path = "../player-platform-macos" }

[target.'cfg(target_os = "linux")'.dependencies]
player-platform-linux = { path = "../player-platform-linux" }

[target.'cfg(target_os = "windows")'.dependencies]
player-platform-windows = { path = "../player-platform-windows" }
