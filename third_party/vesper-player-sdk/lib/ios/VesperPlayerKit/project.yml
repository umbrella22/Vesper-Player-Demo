name: VesperPlayerKit
options:
  bundleIdPrefix: io.github.ikaros.vesper.lib
targets:
  VesperPlayerKitBridgeShim:
    type: library.static
    platform: iOS
    deploymentTarget: "17.0"
    preBuildScripts:
      - name: Stage Shim Module Map
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/include/${PRODUCT_NAME}"
          cat > "${BUILT_PRODUCTS_DIR}/include/${PRODUCT_NAME}/module.modulemap" <<'EOF'
          module VesperPlayerKitBridgeShim {
            header "VesperPlayerKitBridgeShim.h"
            export *
          }
          EOF
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/include/$(PRODUCT_NAME)/module.modulemap
    sources:
      - path: Sources/VesperPlayerKitBridgeShim
        excludes:
          - include
      - path: Sources/VesperPlayerKitBridgeShim/include
        excludes:
          - module.modulemap
        buildPhase: headers
        headerVisibility: public
    settings:
      base:
        DEFINES_MODULE: true
        MODULEMAP_FILE: $(BUILT_PRODUCTS_DIR)/include/$(PRODUCT_NAME)/module.modulemap
        "ARCHS[sdk=iphonesimulator*]": arm64
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        "ARCHS[sdk=macosx*]": arm64
        "EXCLUDED_ARCHS[sdk=macosx*]": x86_64
  VesperPlayerKit:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - target: VesperPlayerKitBridgeShim
        link: true
    preBuildScripts:
      - name: Build Rust iOS Resolver
        script: |
          export VESPER_BUILD_IOS_PLAYER_FFI_MODE=platform
          "${SRCROOT}/../../../scripts/ios/build-player-ffi-xcframework.sh"
        outputFiles:
          - $(SRCROOT)/Artifacts/rust-player-ffi/$(PLATFORM_NAME)/libplayer_ffi_ios.a
    sources:
      - Sources/VesperPlayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.ikaros.vesper.lib.ioshost
        DEFINES_MODULE: true
        SKIP_INSTALL: false
        BUILD_LIBRARY_FOR_DISTRIBUTION: true
        SWIFT_ENABLE_EXPLICIT_MODULES: false
        "ARCHS[sdk=iphonesimulator*]": arm64
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        "ARCHS[sdk=macosx*]": arm64
        "EXCLUDED_ARCHS[sdk=macosx*]": x86_64
        LIBRARY_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/Artifacts/rust-player-ffi/$(PLATFORM_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -lplayer_ffi_ios
    info:
      path: Sources/Generated-Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: FMWK
        CFBundleShortVersionString: "0.3.0"
        CFBundleVersion: "3"
    scheme:
      testTargets:
        - VesperPlayerKitTests
  VesperPlayerKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - target: VesperPlayerKit
    sources:
      - Tests/VesperPlayerKitTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        "ARCHS[sdk=iphonesimulator*]": arm64
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        "ARCHS[sdk=macosx*]": arm64
        "EXCLUDED_ARCHS[sdk=macosx*]": x86_64
