name: vesper_player
description: Flutter-facing Vesper Player controller and Hole Punch view.
version: 0.3.0
homepage: https://github.com/umbrella22/Vesper
repository: https://github.com/umbrella22/Vesper

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  vesper_player_android: ^0.3.0
  vesper_player_ios: ^0.3.0
  vesper_player_platform_interface: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        default_package: vesper_player_android
      ios:
        default_package: vesper_player_ios
