name: vesper_player_external_playback
description: Optional external playback integration for Vesper Player Flutter hosts.
version: 0.3.0
homepage: https://github.com/umbrella22/Vesper
repository: https://github.com/umbrella22/Vesper

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  material_ui: ^0.0.1
  vesper_player: ^0.3.0
  vesper_player_platform_interface: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.github.ikaros.vesper.player.flutter.externalplayback
        pluginClass: VesperPlayerExternalPlaybackPlugin
