name: vesper_player_ios
description: iOS federated implementation for Vesper Player Flutter plugin.
version: 0.3.0
homepage: https://github.com/umbrella22/Vesper
repository: https://github.com/umbrella22/Vesper

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  vesper_player_platform_interface: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: vesper_player
    platforms:
      ios:
        pluginClass: VesperPlayerIosPlugin
        dartPluginClass: VesperPlayerIos
