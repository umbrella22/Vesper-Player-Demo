name: Vesper Flutter CI

on:
  pull_request:
    paths:
      - ".github/workflows/flutter-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/**"
      - "crates/model/**"
      - "crates/core/**"
      - "crates/ffi/**"
      - "crates/plugin/**"
      - "crates/audio/**"
      - "crates/render/**"
      - "crates/backend/**"
      - "crates/plugin-decoder/**"
      - "crates/plugin-remux/**"
      - "crates/platform/common/**"
      - "crates/platform/mobile/**"
      - "crates/platform/jni/**"
      - "lib/android/**"
      - "lib/ios/VesperPlayerKit/**"
      - "lib/flutter/**"
      - "examples/flutter-host/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/flutter-ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/**"
      - "crates/model/**"
      - "crates/core/**"
      - "crates/ffi/**"
      - "crates/plugin/**"
      - "crates/audio/**"
      - "crates/render/**"
      - "crates/backend/**"
      - "crates/plugin-decoder/**"
      - "crates/plugin-remux/**"
      - "crates/platform/common/**"
      - "crates/platform/mobile/**"
      - "crates/platform/jni/**"
      - "lib/android/**"
      - "lib/ios/VesperPlayerKit/**"
      - "lib/flutter/**"
      - "examples/flutter-host/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    name: Flutter Shared Analyze and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Analyze and test shared Flutter packages
        shell: bash
        run: |
          set -euo pipefail

          for pkg_dir in \
            lib/flutter/vesper_player_platform_interface \
            lib/flutter/vesper_player \
            lib/flutter/vesper_player_ui
          do
            echo "::group::$pkg_dir"
            (
              cd "$pkg_dir"
              flutter pub get
              flutter analyze
              if [[ -d test ]]; then
                flutter test
              else
                echo "No test/ directory; skipping flutter test."
              fi
            )
            echo "::endgroup::"
          done

      - name: Flutter pub publish dry-run
        run: ./scripts/vesper flutter pub-dry-run /tmp/vesper-flutter-pub-dry-run

  flutter-macos-quality:
    name: Flutter macOS Package Quality
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Analyze and test Flutter macOS package
        shell: bash
        run: |
          set -euo pipefail

          pkg_dir="lib/flutter/vesper_player_macos"
          echo "::group::$pkg_dir"
          (
            cd "$pkg_dir"
            flutter pub get
            flutter analyze
            if [[ -d test ]]; then
              flutter test
            else
              echo "No test/ directory; skipping flutter test."
            fi
          )
          echo "::endgroup::"

  flutter-android:
    name: Flutter Android Host ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            rust_target: aarch64-linux-android
            flutter_target: android-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cbindgen
        run: cargo install cbindgen --locked

      - name: Verify generated FFI header
        run: ./scripts/vesper ffi verify

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve Android SDK root
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}" >> "$GITHUB_ENV"

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.14206865"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - name: Build Android FFmpeg runtime AAR
        run: ./scripts/vesper ffmpeg --platform android --profile default --abi ${{ matrix.abi }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Write Android local.properties
        run: |
          cat <<EOF > examples/flutter-host/android/local.properties
          sdk.dir=${ANDROID_SDK_ROOT}
          flutter.sdk=${FLUTTER_ROOT}
          EOF

      - name: Write Flutter Android gradle.properties
        run: |
          cat <<EOF > examples/flutter-host/android/gradle.properties
          org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
          android.useAndroidX=true
          vesper.player.android.abis=${{ matrix.abi }}
          vesper.player.android.app.abis=${{ matrix.abi }}
          vesper.player.android.ffmpegProfile=default
          vesper.player.android.external.ffmpegProfile=default
          EOF

      - name: Check Android bridge crates
        run: cargo check -p player-platform-android -p player-jni-android

      - name: Test Android bridge crates
        run: cargo test -p player-platform-android -p player-jni-android

      - name: Analyze and test Flutter Android packages
        shell: bash
        run: |
          set -euo pipefail

          for pkg_dir in \
            lib/flutter/vesper_player_android \
            lib/flutter/vesper_player_external_playback
          do
            echo "::group::$pkg_dir"
            (
              cd "$pkg_dir"
              flutter pub get
              flutter analyze
              if [[ -d test ]]; then
                flutter test
              else
                echo "No test/ directory; skipping flutter test."
              fi
            )
            echo "::endgroup::"
          done

      - name: Install Flutter dependencies
        working-directory: examples/flutter-host
        run: flutter pub get

      - name: Analyze Flutter Android host
        working-directory: examples/flutter-host
        run: flutter analyze

      - name: Test Flutter Android host
        working-directory: examples/flutter-host
        run: flutter test

      - name: Build Flutter Android host release
        working-directory: examples/flutter-host
        run: flutter build apk --release --target-platform ${{ matrix.flutter_target }}

      - name: Stage Flutter Android release APK
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p artifacts/flutter-android
          cp \
            examples/flutter-host/build/app/outputs/flutter-apk/app-release.apk \
            artifacts/flutter-android/flutter-host-${{ matrix.abi }}-release.apk

      - name: Upload Flutter Android release APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-host-android-${{ matrix.abi }}-release-apk
          path: artifacts/flutter-android/*.apk

  flutter-ios:
    name: Flutter iOS Host arm64
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Select Xcode 26.3
        run: xcodebuild -version

      - name: Show Flutter version
        run: flutter --version

      - name: Enable Swift Package Manager
        run: |
          flutter config --enable-swift-package-manager
          flutter config

      - name: Install Flutter dependencies
        working-directory: examples/flutter-host
        run: flutter pub get

      - name: Check iOS bridge crates
        run: cargo check -p player-platform-ios -p player-ffi-ios

      - name: Test iOS bridge crates
        run: cargo test -p player-platform-ios -p player-ffi-ios

      - name: Verify VesperPlayerKit bridge shim
        run: ./scripts/vesper ios verify-bridge-shim

      - name: Analyze and test Flutter iOS package
        shell: bash
        run: |
          set -euo pipefail

          pkg_dir="lib/flutter/vesper_player_ios"
          echo "::group::$pkg_dir"
          (
            cd "$pkg_dir"
            flutter pub get
            flutter analyze
            if [[ -d test ]]; then
              flutter test
            else
              echo "No test/ directory; skipping flutter test."
            fi
          )
          echo "::endgroup::"

      - name: Analyze Flutter iOS host
        working-directory: examples/flutter-host
        run: flutter analyze

      - name: Test Flutter iOS host
        working-directory: examples/flutter-host
        run: flutter test

      - name: Build Rust iOS resolver bundle
        run: ./scripts/vesper ios ffi release

      - name: Build Flutter iOS host release
        working-directory: examples/flutter-host
        run: flutter build ios --release --no-codesign

      - name: Upload Flutter iOS release app
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-host-ios-arm64-release-app
          path: examples/flutter-host/build/ios/iphoneos/Runner.app
