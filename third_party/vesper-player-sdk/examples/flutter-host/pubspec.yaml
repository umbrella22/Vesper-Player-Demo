name: flutter_host
description: Flutter host app for Vesper Player federated plugin validation.
publish_to: 'none'
version: 0.3.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  vesper_player:
    path: ../../lib/flutter/vesper_player
  vesper_player_external_playback:
    path: ../../lib/flutter/vesper_player_external_playback
  vesper_player_ui:
    path: ../../lib/flutter/vesper_player_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
