name: VesperPlayerHostDemo
options:
  bundleIdPrefix: io.github.ikaros.vesper.example
packages:
  VesperPlayerKit:
    path: ../../lib/ios/VesperPlayerKit
targets:
  VesperPlayerHostDemo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    dependencies:
      - package: VesperPlayerKit
        product: VesperPlayerKit
      - package: VesperPlayerKit
        product: VesperPlayerKitUI
    settings:
      base:
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.github.ikaros.vesper.example.ioshost
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    info:
      path: Sources/Info.plist
      properties:
        NSPhotoLibraryUsageDescription: This demo needs Photo Library access so you can pick videos for playback.
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
    postBuildScripts:
      - name: Embed player-remux-ffmpeg plugin
        script: |
          /bin/bash "$SRCROOT/../../scripts/ios/embed-player-remux-ffmpeg-plugin.sh" "VesperPlayerKit.framework"
    scheme:
      testTargets:
        - VesperPlayerHostDemoTests
  VesperPlayerHostDemoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/VesperPlayerHostDemoTests
    dependencies:
      - target: VesperPlayerHostDemo
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
