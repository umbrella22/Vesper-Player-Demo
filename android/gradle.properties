org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Flutter 3.44 still uses legacy Android DSL/KGP compatibility paths when
# configuring Android plugin projects from a Flutter app. Keep these opt-outs
# until the Flutter Gradle plugin can run fully on AGP 9 new DSL + built-in Kotlin.
android.builtInKotlin=false
android.newDsl=false
vesper.player.android.abis=arm64-v8a
vesper.player.android.app.abis=arm64-v8a
vesper.player.ffmpeg.profile=default
